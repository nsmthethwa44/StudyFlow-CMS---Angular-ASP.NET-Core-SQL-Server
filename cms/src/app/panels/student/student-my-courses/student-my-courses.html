<div class="student-my-courses">
    <div class="main-title">
        <h2>My Courses</h2>
        <p>Track your enrolled courses</p>
    </div>

    <!-- filter  -->
    <ul class="filter">
            <li class="active">All</li>
            <li>In Progress</li>
            <li>Completed</li>
    </ul>

      <!-- student courses  -->
        <div class="enrolled-courses">
            <div class="box" *ngFor="let item of enrolled">
                <div class="box-img"><img [src]="`${displayImage(item.thumbnailPath)}`" alt={{item.title}} class="img-box"></div>
                <div class="text-box">
                    <h3>{{item.title}}</h3>
                    <p>{{item.description}}</p>
                    <ul>
                        <li><i class="fa-solid fa-clock"></i>23h</li>
                        <li><i class="fa-solid fa-star"></i>67</li>
                    </ul>
                    <div class="continue">
                        <span>Continue<i class="fa-solid fa-angle-right"></i></span>
                    </div>
                </div>
            </div>
        </div>
</div>
