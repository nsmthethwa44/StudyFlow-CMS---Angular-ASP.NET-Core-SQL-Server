<div class="instructor-add-courses" *ngIf="isVisible">
    <form [formGroup]="form" (ngSubmit)="buildCourse()" class="form">
        <h3>Add New Course</h3>
        <div class="close" (click)="hideCourseBuilder()"><i class="fa-solid fa-xmark"></i></div>

        <div class="separator"></div>

        <div class="input-box">
            <label for="title">Course Title:
                <input type="text" class="textBox" placeholder="e.g C# Introduction" formControlName="title">
            </label>
            <label for="description">Short Description:
                <input type="text" class="textBox" placeholder="e.g Lorem Structure" formControlName="description">
            </label>
            <label for="price">Price:
                <input type="number" name="" id="" class="textBox" placeholder="e.g 34.00" formControlName="price">
            </label>
            
            <label for="category">Categories:
                <select name="" id="" class="textBox" formControlName="category">
                    <option value="Education">Education</option>
                    <option value="Food">Food</option>
                    <option value="Excising">Excising</option>
                    <option value="Technology">Technology</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Business">Business</option>
                </select>
            </label>
             <label for="level">Level:
                <select name="" id="" class="textBox" formControlName="level">
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>
            </label>

            <label for="photo">Upload Photo:
                <input type="file" (change)="onFileSelected($event)" class="textBox" accept="image/*">
            </label>
             
        </div>

        <div class="buttons">
            <button class="btn" type="submit"><i class="fa-solid fa-floppy-disk"></i>Submit</button>
        </div>

    </form>
</div>
