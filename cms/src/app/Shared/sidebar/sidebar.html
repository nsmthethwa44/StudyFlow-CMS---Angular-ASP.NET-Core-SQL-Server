<div class="sidebar">
    <div class="content">
        <div class="top">
            <div class="logo">
               <h2><span><i class="fa-solid fa-graduation-cap"></i></span>StudyFlow</h2>
               <div class="close-box" (click)="closeSidebar()"><i class="fa-solid fa-xmark"></i></div>
            </div>

            <div class="separator"></div>

            <div class="navbar">
                <ul class="nav">
                    <li *ngFor="let link of links">
                    <a [routerLink]="link.path"
                        routerLinkActive="active"
                        [routerLinkActiveOptions]="{ exact: true }" (click)="closeSidebar()">
                        <i [ngClass]="link.icon"></i>{{ link.label }}
                    </a>
                    </li>
                </ul>
        </div>
        </div>

        <div class="bottom">
            <div class="separator"></div>
            <ul class="nav">
                <li><a href=""><i class="fa-solid fa-bell"></i>Notifications</a></li>
                <li><a href="" (click)="logOut()"><i class="fa-solid fa-right-from-bracket"></i>Log Out</a></li>
            </ul>
        </div>
    </div>
</div>
